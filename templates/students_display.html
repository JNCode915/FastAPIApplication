
<html>
    <header></header>
    <body>
        <h1>Student Details</h1>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
            <tr span="4">
                <td colspan="4"><a href="/students/addstudent">Add New Student</a></td> 
            </tr>      
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.grade }}</td>
                <td><a href="/students/deletestudent/{{ student.id }}">Delete</a></td>
                <td><a href="/students/updatestudent/{{ student.id }}">Update</a></td>
            </tr>
            {% endfor %}
        </table>
    </body>
